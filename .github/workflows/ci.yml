name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-package:
    name: Test Swift Package (iOS)
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Run Package Tests (iOS)
        run: |
          xcodebuild test \
            -scheme FeatureFlow \
            -destination "platform=iOS Simulator,name=iPhone 17,OS=26.2" \
            OTHER_SWIFT_FLAGS="-strict-concurrency=complete"

  build-demo-ios:
    name: Build Demo (iOS)
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Build iOS Demo
        run: |
          cd Demo
          xcodebuild clean build \
            -scheme Demo \
            -destination "platform=iOS Simulator,name=iPhone 17,OS=26.2" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  build-demo-macos:
    name: Build Demo (macOS)
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Build macOS Demo
        run: |
          cd Demo
          xcodebuild clean build \
            -scheme Demo \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  test-demo-ios:
    name: Test Demo (iOS)
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Run Demo Tests
        run: |
          cd Demo
          xcodebuild clean test \
            -scheme Demo \
            -destination "platform=iOS Simulator,name=iPhone 17,OS=26.2" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

name: Deploy DocC

on:
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Build DocC documentation
        run: |
          swift package --allow-writing-to-directory ./docs-out \
            generate-documentation --target FeatureFlow \
            --output-path ./docs-out \
            --transform-for-static-hosting \
            --hosting-base-path FeatureFlow

      - name: Fix root redirect
        run: |
          echo '<meta http-equiv="refresh" content="0; url=documentation/featureflow">' > docs-out/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: 'docs-out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
